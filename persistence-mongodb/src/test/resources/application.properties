# MongoDB provided by Quarkus Dev Services (Testcontainers) — no explicit URI needed
quarkus.mongodb.database=platform_test

# Avoid port conflicts when multiple @QuarkusTest classes boot Quarkus
quarkus.http.test-port=0

quarkus.arc.unremovable-types=io.casehub.platform.persistence.mongodb.MongoPreferenceProvider,io.casehub.platform.persistence.mongodb.MongoPreferenceIndexes
