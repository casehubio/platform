# H2 in-memory with PostgreSQL mode
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:acltest;DB_CLOSE_DELAY=-1;MODE=PostgreSQL

# Generate schema from JPA entities
quarkus.hibernate-orm.schema-management.strategy=drop-and-create

# CDI index — discover ACL JPA beans from the library JAR
quarkus.index-dependency.acl-jpa.group-id=io.casehub
quarkus.index-dependency.acl-jpa.artifact-id=casehub-platform-acl-jpa
