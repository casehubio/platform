# DevServices auto-starts PostgreSQL testcontainer
quarkus.datasource.db-kind=postgresql
quarkus.datasource.devservices.enabled=true

# Flyway creates schema via JDBC; reactive Hibernate validates mapping
quarkus.flyway.locations=classpath:db/acl/migration
quarkus.flyway.migrate-at-start=true
quarkus.flyway.clean-at-start=true
quarkus.hibernate-orm.schema-management.strategy=none

# CDI index — discover ACL JPA beans from the library JAR
quarkus.index-dependency.acl-jpa.group-id=io.casehub
quarkus.index-dependency.acl-jpa.artifact-id=casehub-platform-acl-jpa
