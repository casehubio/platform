casehub.platform.scim.token=test-static-token
# quarkus.rest-client.scim.url is injected dynamically by ScimWireMockResource
# Small page size so pagination tests use manageable fixture data
casehub.platform.scim.member-page-size=3

# Tests use the static token path — oidc-client is never exercised, so Keycloak DevServices
# would start and consume ~600MB for nothing. Disable it explicitly.
quarkus.keycloak.devservices.enabled=false
